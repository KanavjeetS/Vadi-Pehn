name: Vadi-Pehn CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ─────────────────────────────────────────────────────────
  # Lint & Format
  # ─────────────────────────────────────────────────────────
  lint:
    name: Lint & Format (black + ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: pip install black ruff mypy pydantic pydantic-settings

      - name: black
        run: black --check services/

      - name: ruff
        run: ruff check services/

      - name: mypy
        run: mypy services/ --ignore-missing-imports --no-error-summary || true
        # mypy in CI is informational for now — will be strict in Phase 1+

  # ─────────────────────────────────────────────────────────
  # Unit Tests — no external services required
  # ─────────────────────────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio pydantic pydantic-settings fastapi httpx asyncpg langfuse jinja2 numpy
          pip install langgraph==0.2.74 langchain-core==0.3.80

      - name: Run unit tests
        env:
          # Minimal env for Settings to load without real services
          MEMORY_DB_PASSWORD: ci_test_password
          GOVERNANCE_DB_PASSWORD: ci_test_password
          MINIO_ACCESS_KEY: ci_test_key
          MINIO_SECRET_KEY: ci_test_secret
          JWT_SECRET_KEY: ci_test_jwt_secret_32_chars_min
        run: |
          pytest -q -p pytest_asyncio.plugin --asyncio-mode=auto

  # ─────────────────────────────────────────────────────────
  # Safety Invariant Audit (runs on every push)
  # Checks that GUARDRAILS invariants are not violated in code
  # ─────────────────────────────────────────────────────────
  safety-invariants:
    name: Safety Invariant Tests (GUARDRAILS)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio pydantic pydantic-settings
          pip install langgraph langchain-core httpx

      - name: Run GUARDRAILS invariant tests
        env:
          MEMORY_DB_PASSWORD: ci_test
          GOVERNANCE_DB_PASSWORD: ci_test
          MINIO_ACCESS_KEY: ci_test
          MINIO_SECRET_KEY: ci_test
          JWT_SECRET_KEY: ci_test_jwt_secret_32_chars_min
        run: |
          pytest services/orchestration/tests/test_graph.py -v \
            --tb=long \
            --asyncio-mode=auto \
            -x  # fail fast — any broken invariant is a blocker

  # ─────────────────────────────────────────────────────────
  # Build Docker images (verify Dockerfiles build cleanly)
  # ─────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [test-unit, safety-invariants]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build safety-proxy (dev target)
        run: |
          docker build services/safety-proxy \
            --target dev \
            --tag vadi-safety-proxy:ci \
            --load || echo "Dockerfile not yet present — skipping (Phase 2)"
        continue-on-error: true   # Phase 0: service Dockerfiles built per phase
