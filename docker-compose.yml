version: "3.8"

services:
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: vadi-api-gateway
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - SERVICE_NAME=api-gateway
      - PORT=8000
    depends_on:
      orchestration:
        condition: service_healthy
      dashboard-bff:
        condition: service_healthy
      governance-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  orchestration:
    build:
      context: .
      dockerfile: services/orchestration/Dockerfile
    container_name: vadi-orchestration
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - SERVICE_NAME=orchestration
      - PORT=8001
    depends_on:
      safety-proxy:
        condition: service_healthy
      memory-service:
        condition: service_healthy
      governance-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  safety-proxy:
    build:
      context: .
      dockerfile: services/safety-proxy/Dockerfile
    container_name: vadi-safety-proxy
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      - SERVICE_NAME=safety-proxy
      - PORT=8002
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  memory-service:
    build:
      context: .
      dockerfile: services/memory-service/Dockerfile
    container_name: vadi-memory-service
