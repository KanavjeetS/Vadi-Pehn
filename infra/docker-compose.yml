# DEPRECATED — DO NOT USE FOR PRIMARY DEPLOYMENTS
# Canonical production docker-compose definition is located at root: ../docker-compose.yml
# To run full stack: .\vadi.ps1 docker-up (or docker compose -f docker-compose.yml up -d)
# To run dev server: .\vadi.ps1 dev (or python start_desktop.py)
#
version: '3.8'

services:
  # 1. Memory Database (Postgres + pgvector)
  postgres-memory:
    image: pgvector/pgvector:pg16
    container_name: vadi-postgres-memory
    environment:
      POSTGRES_DB: vadi_memory
      POSTGRES_USER: vadi_app
      POSTGRES_PASSWORD: secret_memory_pass
    ports:
      - "5432:5432"
    volumes:
      - memory_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vadi_app -d vadi_memory"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Governance Database (Physically Isolated Postgres Instance per Architecture Non-Negotiable)
  postgres-governance:
    image: postgres:16-alpine
    container_name: vadi-postgres-governance
    environment:
      POSTGRES_DB: vadi_governance
      POSTGRES_USER: vadi_gov_app
      POSTGRES_PASSWORD: secret_gov_pass
    ports:
      - "5433:5432"
    volumes:
      - gov_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vadi_gov_app -d vadi_governance"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. Redis Queue Broker
  redis:
    image: redis:7-alpine
    container_name: vadi-redis
    ports:
      - "6379:6379"

  # 4. Ollama Open-Source Local LLM Service
  ollama:
    image: ollama/ollama:latest
    container_name: vadi-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama

  # 5. API Gateway Service (Main BFF & Router)
  api-gateway:
    build:
      context: ..
      dockerfile: services/api-gateway/Dockerfile
    container_name: vadi-api-gateway
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - MEMORY_DB_HOST=postgres-memory
      - GOVERNANCE_DB_HOST=postgres-governance
      - REDIS_URL=redis://redis:6379/0
      - ORCHESTRATION_URL=http://orchestration:8001
      - VOICE_GATEWAY_URL=http://voice-gateway:8002
      - GOVERNANCE_SERVICE_URL=http://governance-service:8003
    depends_on:
      - postgres-memory
      - postgres-governance
      - redis
      - orchestration

  # 6. Orchestration Service (LangGraph Core & Memory)
  orchestration:
    build:
      context: ..
      dockerfile: services/orchestration/Dockerfile
    container_name: vadi-orchestration
    ports:
      - "8001:8001"
    environment:
      - ENVIRONMENT=production
      - MEMORY_DB_HOST=postgres-memory
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      - postgres-memory
      - ollama
      - redis

  # 7. Voice Gateway Service (LiveKit, Groq, ElevenLabs, VAD)
  voice-gateway:
    build:
      context: ..
      dockerfile: services/voice-gateway/Dockerfile
    container_name: vadi-voice-gateway
    ports:
      - "8002:8002"
    environment:
      - ENVIRONMENT=production
      - ORCHESTRATION_URL=http://orchestration:8001
    depends_on:
      - orchestration

  # 8. Governance Service (Consent Ledger & 15-Min SLA Incidents)
  governance-service:
    build:
      context: ..
      dockerfile: services/governance-service/Dockerfile
    container_name: vadi-governance-service
    ports:
      - "8003:8003"
    environment:
      - ENVIRONMENT=production
      - GOVERNANCE_DB_HOST=postgres-governance
    depends_on:
      - postgres-governance

  # 9. Safety Proxy (NeMo Guardrails & Aegis Fail-Closed Proxy)
  safety-proxy:
    build:
      context: ..
      dockerfile: services/safety-proxy/Dockerfile
    container_name: vadi-safety-proxy
    ports:
      - "8080:8080"
    environment:
      - ENVIRONMENT=production
      - SAFETY_PROXY_TIMEOUT_SECONDS=3.0

  # 10. Panel Service (CrewAI Career Mentor MoE)
  panel-service:
    build:
      context: ..
      dockerfile: services/panel-service/Dockerfile
    container_name: vadi-panel-service
    ports:
      - "8005:8005"
    environment:
      - ENVIRONMENT=production
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      - ollama

volumes:
  memory_db_data:
  gov_db_data:
  ollama_models:
