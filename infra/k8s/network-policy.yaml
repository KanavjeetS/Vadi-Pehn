# EXPERIMENTAL / REFERENCE ONLY
# Enterprise Kubernetes NetworkPolicy stubs for future cloud hosting.
# For current production stack, use root docker-compose.yml via .\vadi.ps1 docker-up
#
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: enforce-safety-proxy-routing
  namespace: vadi-pehn
spec:
  podSelector:
    matchLabels:
      app: vllm-main
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: safety-proxy
    ports:
    - protocol: TCP
      port: 8000
