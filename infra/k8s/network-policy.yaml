apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: enforce-safety-proxy-routing
  namespace: vadi-pehn
spec:
  podSelector:
    matchLabels:
      app: vllm-main
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: safety-proxy
    ports:
    - protocol: TCP
      port: 8000
