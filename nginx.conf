worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 32m;

    # Gzip for static assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;

    upstream api_gateway {
        server api-gateway:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # ── Health check (nginx self) ───────────────────────────────────────
        location = /healthz {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ── API — reverse-proxy to api-gateway ────────────────────────────
        location /api/ {
            proxy_pass         http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # ── Internal endpoints proxied through api-gateway ────────────────
        location /internal/ {
            proxy_pass         http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
            proxy_read_timeout 30s;
        }

        # ── Child companion SPA (/child/) ─────────────────────────────────
        location /child/ {
            try_files $uri $uri/ /child/index.html;
        }

        # ── Guardian portal SPA (/guardian/) ─────────────────────────────
        location /guardian/ {
            try_files $uri $uri/ /guardian/index.html;
        }

        # ── Admin portal SPA (/admin/) ────────────────────────────────────
        location /admin/ {
            try_files $uri $uri/ /admin/index.html;
        }

        # ── Static assets (JS, CSS, images, fonts) ───────────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # ── Landing page / default ────────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── Security headers ──────────────────────────────────────────────
        add_header X-Frame-Options       "SAMEORIGIN"   always;
        add_header X-Content-Type-Options "nosniff"      always;
        add_header Referrer-Policy       "strict-origin" always;
    }
}
