<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vadi-Pehn — Multi-Role Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #090d16;
            --card-glass: rgba(15, 23, 42, 0.75);
            --card-border: rgba(255, 255, 255, 0.12);
            --brand-primary: #7c3aed;
            --brand-primary-hover: #6d28d9;
            --brand-cyan: #00bbf9;
            --brand-green: #10b981;
            --brand-pink: #ec4899;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --font-main: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-kid: 'Outfit', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-main);
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Mesh Background */
        .mesh-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: 
                radial-gradient(circle at 15% 20%, rgba(124, 58, 237, 0.3) 0%, transparent 45%),
                radial-gradient(circle at 85% 80%, rgba(0, 187, 249, 0.25) 0%, transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(236, 72, 153, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 80% 15%, rgba(16, 185, 129, 0.2) 0%, transparent 40%);
            filter: blur(40px);
            animation: meshGlow 18s ease-in-out infinite alternate;
        }

        @keyframes meshGlow {
            0% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(3deg); }
            100% { transform: scale(1.05) rotate(-3deg); }
        }

        /* HTML5 Canvas Particle Background */
        #particle-canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* Page Transition Overlay */
        .page-transition-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .page-transition-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        /* Container Card */
        .auth-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 480px;
            background: var(--card-glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 40px 36px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6), 0 0 60px rgba(124, 58, 237, 0.2);
            animation: containerPop 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes containerPop {
            0% { opacity: 0; transform: translateY(20px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Header */
        .brand-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .brand-badge {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--brand-primary) 0%, var(--brand-pink) 100%);
            color: #fff;
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 8px 24px rgba(124, 58, 237, 0.4);
            margin-bottom: 12px;
            animation: floatLogo 4s ease-in-out infinite alternate;
        }

        @keyframes floatLogo {
            0% { transform: translateY(0); }
            100% { transform: translateY(-6px); }
        }

        .brand-title {
            font-family: var(--font-kid);
            font-size: 30px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #fff;
        }

        .brand-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Sliding Role Selector Tabs */
        .role-tabs-wrapper {
            position: relative;
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 4px;
            margin-bottom: 24px;
            display: flex;
        }

        .role-tab-indicator {
            position: absolute;
            top: 4px;
            bottom: 4px;
            left: 4px;
            width: calc((100% - 8px) / 3);
            background: linear-gradient(135deg, var(--brand-primary) 0%, #6366f1 100%);
            border-radius: 12px;
            box-shadow: 0 4px 14px rgba(124, 58, 237, 0.4);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
        }

        .tab-btn {
            flex: 1;
            position: relative;
            z-index: 2;
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 10px 8px;
            border-radius: 12px;
            font-family: var(--font-main);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: color 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .tab-btn:focus-visible {
            outline: 2px solid var(--brand-cyan);
            outline-offset: 2px;
        }

        .tab-btn.active {
            color: #ffffff;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            background: rgba(15, 23, 42, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            padding: 13px 16px;
            color: #fff;
            font-family: var(--font-main);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .form-input:focus {
            border-color: var(--brand-primary);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.3);
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--brand-primary) 0%, #6366f1 100%);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 16px;
            font-family: var(--font-main);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(124, 58, 237, 0.4);
            transition: all 0.2s ease;
            margin-top: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(124, 58, 237, 0.5);
        }

        .submit-btn:focus-visible {
            outline: 2px solid var(--brand-cyan);
            outline-offset: 2px;
        }

        /* Demo Accounts Section */
        .demo-divider {
            display: flex;
            align-items: center;
            margin: 28px 0 20px 0;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .demo-divider::before, .demo-divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .demo-divider span {
            padding: 0 12px;
        }

        .demo-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .demo-btn {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f1f5f9;
            padding: 12px 16px;
            border-radius: 14px;
            font-family: var(--font-main);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s ease;
        }

        .demo-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateY(-1px);
        }

        .demo-btn.child-demo:hover { border-color: #8b5cf6; background: rgba(139, 92, 246, 0.15); }
        .demo-btn.guardian-demo:hover { border-color: #00bbf9; background: rgba(0, 187, 249, 0.15); }
        .demo-btn.admin-demo:hover { border-color: #10b981; background: rgba(16, 185, 129, 0.15); }

        .demo-btn:focus-visible {
            outline: 2px solid var(--brand-cyan);
            outline-offset: 2px;
        }

        .demo-arrow {
            font-size: 14px;
            opacity: 0.8;
            font-weight: 700;
        }

        /* Footer links */
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--brand-cyan);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .error-banner {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.35);
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            animation: shakeBanner 0.4s ease;
        }

        @keyframes shakeBanner {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }
    </style>
</head>
<body>

    <!-- Background Elements -->
    <div class="mesh-bg"></div>
    <canvas id="particle-canvas"></canvas>

    <!-- Page Transition -->
    <div id="page-transition" class="page-transition-overlay"></div>

    <div class="auth-container">
        <div class="brand-header">
            <div class="brand-badge">🫶</div>
            <h1 class="brand-title">Welcome to Vadi-Pehn</h1>
            <p class="brand-subtitle">Sign in to enter your role dashboard</p>
        </div>

        <div id="error-banner" class="error-banner" role="alert" aria-live="assertive"></div>

        <!-- Sliding Role Tabs -->
        <div class="role-tabs-wrapper" role="tablist" aria-label="Select User Role">
            <div id="tab-indicator" class="role-tab-indicator"></div>
            <button type="button" class="tab-btn active" id="tab-learner" role="tab" aria-selected="true" onclick="selectRole('learner', 0)">
                <span>👦</span> Child / Kid
            </button>
            <button type="button" class="tab-btn" id="tab-guardian" role="tab" aria-selected="false" onclick="selectRole('guardian', 1)">
                <span>🛡️</span> Guardian
            </button>
            <button type="button" class="tab-btn" id="tab-admin" role="tab" aria-selected="false" onclick="selectRole('admin', 2)">
                <span>⚙️</span> Admin
            </button>
        </div>

        <!-- Login Form -->
        <form id="login-form" onsubmit="handleLogin(event)">
            <input type="hidden" id="selected-role" value="learner">

            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" class="form-input" placeholder="e.g. child@vadi.demo" required autocomplete="username">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" class="submit-btn" id="login-submit-btn">
                <span>Sign In to Dashboard</span>
                <span>→</span>
            </button>
        </form>

        <!-- One-Click Quick Demo Login -->
        <div class="demo-divider">
            <span>Or Quick One-Click Demo</span>
        </div>

        <div class="demo-grid">
            <button type="button" class="demo-btn child-demo" onclick="handleDemoLogin('learner')">
                <span>🚀 One-Click Child Demo</span>
                <span class="demo-arrow">→ /child/</span>
            </button>

            <button type="button" class="demo-btn guardian-demo" onclick="handleDemoLogin('guardian')">
                <span>🛡️ One-Click Guardian Demo</span>
                <span class="demo-arrow">→ /guardian/</span>
            </button>

            <button type="button" class="demo-btn admin-demo" onclick="handleDemoLogin('admin')">
                <span>⚙️ One-Click Admin Demo</span>
                <span class="demo-arrow">→ /admin/</span>
            </button>
        </div>

        <div class="auth-footer">
            Don't have an account yet? <a href="/signup.html">Create an Account</a>
        </div>
    </div>

    <script>
        // Particle Background System
        (function initParticles() {
            const canvas = document.getElementById('particle-canvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            let particles = [];

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() {
                    this.reset();
                }
                reset() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.vx = (Math.random() - 0.5) * 0.4;
                    this.vy = (Math.random() - 0.5) * 0.4;
                    this.radius = Math.random() * 2 + 1;
                    this.alpha = Math.random() * 0.5 + 0.2;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
                        this.reset();
                    }
                }
                draw() {
                    ctx.save();
                    ctx.globalAlpha = this.alpha;
                    ctx.fillStyle = '#8b5cf6';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }

            for (let i = 0; i < 45; i++) {
                particles.push(new Particle());
            }

            function animate() {
                ctx.clearRect(0, 0, width, height);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                requestAnimationFrame(animate);
            }
            animate();
        })();

        // Sliding Role Tab Switcher
        function selectRole(role, index) {
            document.getElementById('selected-role').value = role;
            const indicator = document.getElementById('tab-indicator');
            indicator.style.transform = `translateX(${index * 100}%)`;

            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach((btn, i) => {
                const isActive = i === index;
                btn.classList.toggle('active', isActive);
                btn.setAttribute('aria-selected', isActive ? 'true' : 'false');
            });

            const emailInput = document.getElementById('email');
            if (role === 'learner' && (!emailInput.value || emailInput.value.includes('@vadi.demo'))) emailInput.value = 'child@vadi.demo';
            if (role === 'guardian' && (!emailInput.value || emailInput.value.includes('@vadi.demo'))) emailInput.value = 'guardian@vadi.demo';
            if (role === 'admin' && (!emailInput.value || emailInput.value.includes('@vadi.demo'))) emailInput.value = 'admin@vadi.demo';
        }

        // URL Query Role Auto-Selection
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const roleParam = params.get('role');
            if (roleParam === 'guardian') selectRole('guardian', 1);
            else if (roleParam === 'admin') selectRole('admin', 2);
            else selectRole('learner', 0);
        });

        function saveAuthSession(data) {
            const token = data.access_token;
            const tenantId = data.tenant_id;
            const role = data.role;
            const userId = data.user_id;
            const learnerId = data.learner_id || data.user_id;
            const guardianId = data.guardian_id || data.user_id;
            const adminId = data.admin_id || data.user_id;

            localStorage.setItem('vadi_access_token', token);
            localStorage.setItem('access_token', token);
            localStorage.setItem('vadi_tenant_id', tenantId);
            localStorage.setItem('tenant_id', tenantId);
            localStorage.setItem('vadi_role', role);
            localStorage.setItem('role', role);
            localStorage.setItem('vadi_user_id', userId);
            localStorage.setItem('user_id', userId);
            localStorage.setItem('vadi_learner_id', learnerId);
            localStorage.setItem('learner_id', learnerId);
            localStorage.setItem('vadi_guardian_id', guardianId);
            localStorage.setItem('guardian_id', guardianId);
            localStorage.setItem('vadi_admin_id', adminId);
            localStorage.setItem('admin_id', adminId);

            sessionStorage.setItem('vadi_access_token', token);
            sessionStorage.setItem('access_token', token);
            sessionStorage.setItem('vadi_tenant_id', tenantId);
            sessionStorage.setItem('tenant_id', tenantId);
            sessionStorage.setItem('vadi_role', role);
            sessionStorage.setItem('role', role);
            sessionStorage.setItem('vadi_user_id', userId);
            sessionStorage.setItem('user_id', userId);
            sessionStorage.setItem('vadi_learner_id', learnerId);
            sessionStorage.setItem('learner_id', learnerId);
            sessionStorage.setItem('vadi_guardian_id', guardianId);
            sessionStorage.setItem('guardian_id', guardianId);
            sessionStorage.setItem('vadi_admin_id', adminId);
            sessionStorage.setItem('admin_id', adminId);
        }

        function getRedirectUrl(role) {
            if (role === 'guardian') return '/guardian/';
            if (role === 'admin') return '/admin/';
            return '/child/';
        }

        function navigateWithTransition(targetUrl) {
            const overlay = document.getElementById('page-transition');
            overlay.classList.add('active');
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 350);
        }

        async function handleLogin(event) {
            event.preventDefault();
            const errBanner = document.getElementById('error-banner');
            errBanner.style.display = 'none';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const role = document.getElementById('selected-role').value;

            try {
                const res = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, role })
                });

                if (res.ok) {
                    const data = await res.json();
                    saveAuthSession(data);
                    navigateWithTransition(getRedirectUrl(data.role));
                } else {
                    const err = await res.json();
                    errBanner.innerText = err.detail || 'Login failed. Please check credentials.';
                    errBanner.style.display = 'block';
                }
            } catch (e) {
                console.error('Login error:', e);
                errBanner.innerText = 'Connection error. Please try one-click demo login.';
                errBanner.style.display = 'block';
            }
        }

        async function handleDemoLogin(role) {
            const errBanner = document.getElementById('error-banner');
            errBanner.style.display = 'none';

            try {
                const res = await fetch('/api/v1/auth/demo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ role })
                });

                if (res.ok) {
                    const data = await res.json();
                    saveAuthSession(data);
                    navigateWithTransition(getRedirectUrl(data.role));
                } else {
                    const err = await res.json();
                    errBanner.innerText = err.detail || 'Demo login failed.';
                    errBanner.style.display = 'block';
                }
            } catch (e) {
                console.error('Demo auth error:', e);
                // Fallback demo tokens if server offline
                const fallbackDemoData = {
                    access_token: 'demo_token_' + role,
                    tenant_id: '00000000-0000-0000-0000-000000000001',
                    user_id: role === 'guardian' ? '00000000-0000-0000-0000-000000000002' : (role === 'admin' ? '00000000-0000-0000-0000-000000000004' : '00000000-0000-0000-0000-000000000003'),
                    learner_id: '00000000-0000-0000-0000-000000000003',
                    guardian_id: '00000000-0000-0000-0000-000000000002',
                    admin_id: '00000000-0000-0000-0000-000000000004',
                    role: role
                };
                saveAuthSession(fallbackDemoData);
                navigateWithTransition(getRedirectUrl(role));
            }
        }
    </script>
</body>
</html>
